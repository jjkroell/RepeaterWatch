<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MeshCore Repeater Monitor</title>
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <style>
        .login-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 36px 32px;
            width: 100%;
            max-width: 380px;
            text-align: center;
        }
        .login-card h1 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .login-card .subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 24px;
        }
        .login-card input[type="password"] {
            width: 100%;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 0.9rem;
            margin-bottom: 14px;
        }
        .login-card input[type="password"]::placeholder {
            color: var(--text-muted);
        }
        .login-card input[type="password"]:focus {
            outline: none;
            border-color: var(--accent);
        }
        .login-card button {
            width: 100%;
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }
        .login-card button:hover {
            background: var(--accent-dim);
        }
        .login-error {
            color: var(--red);
            font-size: 0.85rem;
            margin-bottom: 14px;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <h1>MeshCore Repeater Monitor</h1>
            <p class="subtitle">Enter password to continue</p>
            {% if error %}
            <p class="login-error">{{ error }}</p>
            {% endif %}
            <form method="POST">
                <input type="password" name="password" placeholder="Password" autofocus required />
                <button type="submit">Log In</button>
            </form>
        </div>
    </div>
</body>
</html>
